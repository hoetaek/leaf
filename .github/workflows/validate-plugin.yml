name: validate-plugin

on:
  pull_request:
    paths:
      - ".claude-plugin/**"
      - ".agents/plugins/**"
      - "plugins/leaf/**"
      - "scripts/validate-manifests.mjs"
      - "Cargo.toml"
  push:
    branches: [develop, main]

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-manifests.mjs
