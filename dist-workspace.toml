[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Keep the generated release workflow hand-editable for branch-policy gates.
allow-dirty = ["ci"]
# Release binaries must include the built web UI so package-manager installs can
# run `leaf serve` standalone.
features = ["embed-web"]
# This is consumed if cargo-dist CI is regenerated. The checked-in release.yml is
# hand-edited, so keep its explicit web build steps in sync with this file.
github-build-setup = "../build-setup.yml"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-pc-windows-msvc", "aarch64-pc-windows-msvc"]
# A GitHub repo to push Homebrew formulas to
tap = "hoetaek/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# Whether to enable GitHub Attestations
github-attestations = true
