repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --check
        entry: bash -c 'unset $(git rev-parse --local-env-vars); cargo fmt --all --check'
        language: system
        pass_filenames: false
        files: ^(Cargo\.toml|Cargo\.lock|src/.*\.rs|tests/.*\.rs)$

      - id: cargo-clippy
        name: cargo clippy
        entry: bash -c 'unset $(git rev-parse --local-env-vars); cargo clippy --all-targets --all-features -- -D warnings'
        language: system
        pass_filenames: false
        files: ^(Cargo\.toml|Cargo\.lock|src/.*\.rs|tests/.*\.rs)$

      - id: cargo-test
        name: cargo test
        entry: bash -c 'unset $(git rev-parse --local-env-vars); cargo test --locked --all-features'
        language: system
        pass_filenames: false
        files: ^(Cargo\.toml|Cargo\.lock|src/.*\.rs|tests/.*\.rs)$
        stages: [pre-push]
