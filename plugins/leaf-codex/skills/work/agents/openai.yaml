  short_description: "Turn vague intent into reliable work"
  default_prompt: "Use $leaf:work with the leaf CLI after Learn: carry the sprout through ⑧ Artifact / Execution, move the ⑧-passed sprout into leaves, run leaf doctor, invoke $leaf:polish for document cleanup, then run ⑨ Review and ⑩ Retrospect; immediately after ⑩, follow using-leaf (Ending a leaf) to keep, press (via $leaf:press), or fall."

