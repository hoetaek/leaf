# Restrict the evaluated dependency graph to the targets we actually ship
# (see [package.metadata.dist] in Cargo.toml). Without this, cargo-deny also
# pulls Windows-only crates such as arboard's clipboard-win (BSL-1.0), which we
# never build or distribute.
[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
]

[advisories]
yanked = "warn"
# RUSTSEC-2024-0436: `paste` is unmaintained (pulled in transitively via
# ratatui). No fix is available and there is no runtime vulnerability; this is a
# pre-existing advisory unrelated to clipboard support.
ignore = ["RUSTSEC-2024-0436"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
confidence-threshold = 0.8
unused-allowed-license = "warn"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "CC0-1.0",
    # Mozilla CA root bundle shipped by webpki-roots (ureq's rustls trust store).
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
